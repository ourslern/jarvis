<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jarvis</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">JARVIS</div>
      <div class="subtitle">Local AI Control Center</div>

      <nav>
        <button onclick="refreshStatus()">System</button>
        <button onclick="refreshSkills()">Skills</button>
        <button onclick="refreshActions()">Actions</button>
      </nav>
    </aside>

    <main>
      <header>
        <div>
          <h1>Jarvis Dashboard</h1>
          <p>Ubuntu AI server · RTX 3080 Ti · Ollama · SearXNG</p>
        </div>
        <div id="health" class="pill">Checking...</div>
      </header>

      <section class="grid">
        <div class="card">
          <h2>System Status</h2>
          <pre id="statusBox">Loading...</pre>
        </div>

        <div class="card">
          <h2>Skills</h2>
          <pre id="skillsBox">Loading...</pre>
        </div>

        <div class="card wide">
          <h2>Chat with Jarvis</h2>
          <div id="chatLog" class="chat-log"></div>
          <div class="chat-input">
            <input id="chatInput" placeholder="Ask Jarvis something..." />
            <button onclick="sendChat()">Send</button>
          </div>
        </div>

        <div class="card wide">
          <h2>Recent Actions</h2>
          <pre id="actionsBox">Loading...</pre>
        </div>
      </section>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
