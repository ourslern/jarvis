<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jarvis</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">JARVIS</div>
      <div class="subtitle">Local AI Control Center</div>

      <nav>
        <button onclick="refreshStatus()">System</button>
        <button onclick="refreshSkills()">Skills</button>
        <button onclick="refreshActions()">Actions</button>
      </nav>
    </aside>

    <main>
      <header>
        <div>
          <h1>Jarvis Dashboard</h1>
          <p>Ubuntu AI server · RTX 3080 Ti · Ollama · SearXNG · Jarvis 3</p>
        </div>
        <div id="health" class="pill">Checking...</div>
      </header>

      <section class="metric-grid">
  <div class="metric-card">
    <div class="metric-title">CPU</div>
    <div class="ring"><span id="cpuValue">0%</span></div>
  </div>

  <div class="metric-card">
    <div class="metric-title">RAM</div>
    <div class="ring"><span id="ramValue">0%</span></div>
  </div>

  <div class="metric-card">
    <div class="metric-title">GPU</div>
    <div class="ring"><span id="gpuValue">0%</span></div>
  </div>

  <div class="metric-card">
    <div class="metric-title">VRAM</div>
    <div class="ring"><span id="vramValue">0%</span></div>
  </div>
</section>

<section class="grid">
  <div class="card">
    <h2>GPU Details</h2>
    <pre id="gpuBox">Loading...</pre>
  </div>

  <div class="card">
    <h2>Docker</h2>
    <pre id="dockerBox">Loading...</pre>
  </div>

  <div class="card wide">
    <h2>AI Models</h2>
    <pre id="modelsBox">Loading...</pre>
  </div>

  <div class="card wide">
    <h2>Chat with Jarvis</h2>
    <div id="chatLog" class="chat-log"></div>
    <div class="chat-input">
      <input id="chatInput" placeholder="Ask Jarvis something..." />
      <button onclick="sendChat()">Send</button>
    </div>
  </div>

  <div class="card wide">
    <h2>Recent Actions</h2>
    <pre id="actionsBox">Loading...</pre>
  </div>
</section>


  <script src="/static/app.js"></script>
</body>
</html>
